<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chief Femi Ifaturoti — 70th Birthday Cruise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      background: #0a1628;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* Ocean wave background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 80%, rgba(13, 71, 161, 0.4) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(183, 121, 31, 0.15) 0%, transparent 50%),
        linear-gradient(180deg, #0a1628 0%, #0d2244 50%, #0a1628 100%);
      z-index: 0;
    }

    /* Animated stars */
    .stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite alternate;
    }

    @keyframes twinkle {
      0% { opacity: 0.2; }
      100% { opacity: 0.9; }
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 24px;
      padding: 52px 48px 44px;
      width: min(420px, 92vw);
      text-align: center;
      backdrop-filter: blur(12px);
      box-shadow:
        0 0 60px rgba(212, 175, 55, 0.08),
        0 24px 60px rgba(0,0,0,0.5);
    }

    /* Sheriff Badge */
    .badge {
      width: 90px;
      height: 90px;
      margin: 0 auto 24px;
      position: relative;
    }
    .badge svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 16px rgba(212, 175, 55, 0.6));
    }

    .title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2.2rem;
      font-weight: 900;
      color: #d4af37;
      line-height: 1.1;
      margin-bottom: 8px;
      text-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
    }

    .subtitle {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .tagline {
      font-size: 1rem;
      color: rgba(255,255,255,0.7);
      margin-bottom: 28px;
      font-style: italic;
    }

    .form-group {
      margin-bottom: 16px;
    }

    input[type="password"] {
      width: 100%;
      padding: 14px 20px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 12px;
      color: white;
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      text-align: center;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      font-family: 'Inter', sans-serif;
    }

    input[type="password"]::placeholder {
      letter-spacing: 0.05em;
      color: rgba(255,255,255,0.3);
      font-size: 0.9rem;
    }

    input[type="password"]:focus {
      border-color: #d4af37;
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15);
    }

    .btn {
      width: 100%;
      padding: 15px 20px;
      background: linear-gradient(135deg, #d4af37, #b8860b);
      border: none;
      border-radius: 12px;
      color: #0a1628;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      font-family: 'Inter', sans-serif;
      margin-top: 4px;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(212, 175, 55, 0.35);
    }

    .btn:active {
      transform: translateY(0);
    }

    .error-msg {
      display: none;
      background: rgba(220, 53, 69, 0.15);
      border: 1px solid rgba(220, 53, 69, 0.4);
      border-radius: 10px;
      color: #ff8080;
      font-size: 0.88rem;
      padding: 10px 16px;
      margin-bottom: 16px;
    }

    .footer {
      position: relative;
      z-index: 1;
      margin-top: 24px;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.05em;
    }

    /* Wave decoration */
    .waves {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- Twinkling stars -->
  <div class="stars" id="stars"></div>

  <!-- Bottom wave -->
  <svg class="waves" viewBox="0 0 1440 120" preserveAspectRatio="none" height="120">
    <path fill="rgba(212,175,55,0.06)" d="M0,60 C240,110 480,10 720,60 C960,110 1200,10 1440,60 L1440,120 L0,120 Z"/>
    <path fill="rgba(13,71,161,0.15)" d="M0,80 C360,30 720,130 1080,80 C1260,55 1380,70 1440,80 L1440,120 L0,120 Z"/>
  </svg>

  <div class="card">
    <!-- Sheriff Badge SVG -->
    <div class="badge">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Star shape (7-point sheriff badge) -->
        <polygon
          points="50,5 61,35 93,35 68,55 78,88 50,68 22,88 32,55 7,35 39,35"
          fill="url(#badgeGrad)"
          stroke="#8B6914"
          stroke-width="2"
        />
        <!-- Inner ring -->
        <circle cx="50" cy="55" r="18" fill="none" stroke="#8B6914" stroke-width="1.5"/>
        <circle cx="50" cy="55" r="14" fill="rgba(10,22,40,0.6)"/>
        <!-- 70 text -->
        <text x="50" y="61" text-anchor="middle" font-family="Georgia, serif" font-weight="bold" font-size="14" fill="#d4af37">70</text>
        <defs>
          <linearGradient id="badgeGrad" x1="0" y1="0" x2="100" y2="100">
            <stop offset="0%" stop-color="#f0d060"/>
            <stop offset="50%" stop-color="#d4af37"/>
            <stop offset="100%" stop-color="#8B6914"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <div class="title">Chief Femi Ifaturoti</div>
    <div class="subtitle">70th Birthday &nbsp;·&nbsp; Star of the Seas &nbsp;·&nbsp; 2026</div>
    <div class="tagline">Lawyer · Statesman · Builder · Husband · Father · Grandfather · Son of Ijesaland · Legend</div>

    <div class="error-msg" id="errMsg">Wrong code — try again.</div>

    <form method="POST" action="/auth">
      <div class="form-group">
        <input
          type="password"
          name="passcode"
          placeholder="Enter the secret code"
          autocomplete="off"
          autofocus
        />
      </div>
      <button type="submit" class="btn">Enter the Celebration &#x2192;</button>
    </form>
  </div>

  <div class="footer">Private — guests only</div>

  <script>
    // Show error if redirected with ?error=wrong
    if (location.search.includes('error=wrong')) {
      document.getElementById('errMsg').style.display = 'block';
    }

    // Generate random stars
    const container = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.left = Math.random() * 100 + 'vw';
      s.style.top = Math.random() * 100 + 'vh';
      s.style.animationDelay = Math.random() * 3 + 's';
      s.style.animationDuration = (2 + Math.random() * 3) + 's';
      s.style.width = s.style.height = (Math.random() > 0.7 ? 3 : 2) + 'px';
      container.appendChild(s);
    }
  </script>
</body>
</html>
